name: Release Rotated

on:
  push:
    tags:
      - "v1.1.2"
      - "v1.1.3-*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Build direct binary assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          version="${GITHUB_REF_NAME#v}"
          commit="$(git rev-parse HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          for target in \
            "darwin amd64" \
            "darwin arm64" \
            "linux amd64" \
            "linux arm64"
          do
            read -r goos goarch <<<"${target}"
            output="dist/ghd-test_${version}_${goos}_${goarch}"

            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build \
              -trimpath \
              -ldflags="-s -w -buildid= -X main.version=${GITHUB_REF_NAME} -X main.commit=${commit} -X main.date=${date}" \
              -o "${output}" \
              ./cmd/ghd-test
          done

          (
            cd dist
            shasum -a 256 ghd-test_* > checksums.txt
          )

      - name: Smoke test released binary version metadata
        shell: bash
        run: |
          set -euo pipefail

          host_os="$(go env GOHOSTOS)"
          host_arch="$(go env GOHOSTARCH)"
          expected_version="${GITHUB_REF_NAME}"
          bin="dist/ghd-test_${GITHUB_REF_NAME#v}_${host_os}_${host_arch}"

          if [[ ! -f "${bin}" ]]; then
            echo "failed to locate host binary in dist/" >&2
            find dist -maxdepth 2 -type f | sort >&2
            exit 1
          fi

          version_output="$("${bin}" version)"
          flag_output="$("${bin}" --version)"

          printf 'version output: %s\n' "${version_output}"
          printf 'flag output: %s\n' "${flag_output}"

          [[ "${version_output}" == *"${expected_version}"* ]]
          [[ "${flag_output}" == *"${expected_version}"* ]]

          for output in "${version_output}" "${flag_output}"; do
            [[ "${output}" =~ \([[:xdigit:]]{7,40}\)\ built\ [0-9]{4}-[0-9]{2}-[0-9]{2}T ]]
            [[ "${output}" != *"(none)"* ]]
            [[ "${output}" != *"built unknown"* ]]
          done

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          cat >"${notes_file}" <<EOF
          ## ghd-test ${GITHUB_REF_NAME}

          \`ghd-test\` is a rotated-signer fixture release for GitHub Downloader functional tests.
          EOF

          release_flags=()
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            release_flags+=(--prerelease)
          fi

          gh release create "${GITHUB_REF_NAME}" dist/ghd-test_* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "${notes_file}" \
            --verify-tag \
            "${release_flags[@]}"

      - name: Attest released files listed in checksums.txt
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: ./dist/checksums.txt
