layer: 'application'

project:
  title: 'ghd-test'
  description: 'Hello-world Go CLI fixture for GitHub Downloader release verification tests.'
  owner: 'meigma'
  maintainers:
    - 'meigma'

workspace:
  inheritedTasks:
    include: []

tasks:
  test:
    command: 'go test ./...'
    toolchains: ['go']
    inputs:
      - 'go.mod'
      - 'cmd/**/*.go'
    options:
      cache: false

  build:
    command: 'go build ./cmd/ghd-test'
    toolchains: ['go']
    inputs:
      - 'go.mod'
      - 'cmd/**/*.go'
    options:
      cache: false
