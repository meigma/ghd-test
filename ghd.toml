[[packages.assets]]
os = "linux"
arch = "amd64"
pattern = "ghd-test_${version}_linux_amd64"

[[packages.assets]]
os = "linux"
arch = "arm64"
pattern = "ghd-test_${version}_linux_arm64"

[[packages.binaries]]
path = "ghd-test"

