version = 1

[provenance]
signer_workflow = "meigma/ghd-test/.github/workflows/release-rotated.yml"

[[packages]]
name = "ghd-test"
description = "Small hello-world CLI fixture for ghd functional tests."
tag_pattern = "v${version}"

[[packages.assets]]
